<div class="container d-flex justify-content-center align-items-center mt-3">
    <div class="card shadow p-4" style="width:400px; user-select: none;">
        <h3 class="text-center mb-4"> ACTUALIZACIÓN DE COMPAÑIAS </h3>

        <form (ngSubmit)="editar()">
            <div class="mb-3">
                <label class="form-label">NOMBRE: </label>
                <input type="text" class="form-control" [(ngModel)]="company.nombre" name="nombre" disabled>
            </div>

            <div class="mb-3">
                <label class="form-label">APELLIDO: </label>
                <input type="text" class="form-control" [(ngModel)]="company.apellido" name="apellido" disabled>
            </div>

            <div class="mb-3">
                <label class="form-label">NUMERO DE EMPLEADO: </label>
                <input type="number" class="form-control" [(ngModel)]="company.numEmpleado" name="numEmpleado" disabled>
            </div>

            <div class="mb-3">
                <label class="form-label">RFC:</label>
                <input type="text" class="form-control" [(ngModel)]="company.rfc" name="rfc">
            </div>

            <div class="mb-3">
                <label class="form-label">COMPAÑIA:</label>
                <textarea class="form-control" [(ngModel)]="company.compania" name="compania" rows="6">
                </textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">NOTA:</label>
                <textarea class="form-control" [(ngModel)]="company.nota" name="nota" rows="6">
                </textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">TRIMESTRE:</label>
                <select class="form-control" [(ngModel)]="company.trimestre" name="trimestre">
                    <option [ngValue]="'1'">ENERO-MARZO</option>
                    <option [ngValue]="'2'">ABRIL-JUNIO</option>
                    <option [ngValue]="'3'">JULIO-SEPTIEMBRE</option>
                    <option [ngValue]="'4'">OCTUBRE-DICIEMBRE</option>
                </select>
            </div>

            <button class="btn btn-primary w-100 mb-3">
                <i class="bi bi-pencil-square me-2"></i> Actualizar compañia
            </button>

            <button class="btn btn-danger w-100 mb-3" (click)="cancelar()">
                <i class="bi bi-x-circle me-2"></i> Cancelar
            </button>
        </form>
    </div>
</div>
