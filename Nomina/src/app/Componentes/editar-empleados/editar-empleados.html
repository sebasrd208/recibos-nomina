<div class="container d-flex justify-content-center align-items-center mt-3">
    <div class="card shadow p-4" style="width:400px; user-select: none;">
        <h3 class="text-center mb-4"> ACTUALIZACIÓN DE EMPLEADOS </h3>

        <form (ngSubmit)="editar()">
            <div class="mb-3">
                <label class="form-label">ID DEL EMPLEADO: </label>
                <input type="text" class="form-control" [(ngModel)]="empleado.idEmpleado" name="idEmpleado" disabled>
            </div>

            <div class="mb-3">
                <label class="form-label">NOMBRE: </label>
                <input type="text" class="form-control" [(ngModel)]="empleado.nombre" name="nombre" disabled>
            </div>

            <div class="mb-3">
                <label class="form-label">APELLIDO: </label>
                <input type="text" class="form-control" [(ngModel)]="empleado.apellido" name="apellido" disabled>
            </div>

            <div class="mb-3">
                <label class="form-label">NUMERO DE EMPLEADO: </label>
                <input type="number" class="form-control" [(ngModel)]="empleado.numEmpleado" name="numEmpleado" disabled>
            </div>

            <div class="mb-3">
                <label class="form-label">TELEFONO:</label>
                <input type="number" class="form-control" [(ngModel)]="empleado.telefono" name="telefono">
            </div>

            <div class="mb-3">
                <label class="form-label">EMPLEO:</label>
                <input type="text" class="form-control" [(ngModel)]="empleado.seccion" name="seccion">
            </div>

            <div class="mb-3">
                <label class="form-label">SUELDO:</label>
                <input type="number" class="form-control" [(ngModel)]="empleado.sueldo" name="sueldo">
            </div>

            <button class="btn btn-primary w-100 mb-3" title='Actualizar empleado'>
                <i class="bi bi-pencil-square me-2"></i> Actualizar empleado
            </button>

            <button class="btn btn-danger w-100 mb-3" (click)="cancelar()" title='Cancelar actualización'>
                <i class="bi bi-x-circle me-2"></i> Cancelar
            </button>
        </form>
    </div>
</div>
