<div class="container d-flex justify-content-center align-items-center mt-3">
    <div class="card shadow p-4" style="width:400px; user-select: none;">
        <h2 class="fw-bold text-secondary text-center mb-2">
            Crear cuenta
        </h2>
        <p class="text-center text-muted mb-4">
            Registrate para acceder al sistema
        </p>

        <form>
            <div class="mb-3">
                <label class="form-label fw-semibold">Usuario: </label>
                <input type="text" name="username" class="form-control form-control-lg"
                    placeholder="Elige un nombre de usuario" [(ngModel)]="usuario.usuario">
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Contraseña: </label>
                <input [type]="showPassword ? 'text' : 'password'" name="password" class="form-control form-control-lg"
                    placeholder="Ingresa una contraseña" [(ngModel)]="usuario.password">
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Confirma contraseña: </label>
                <input [type]="showPassword ? 'text' : 'password'" name="confirm" class="form-control form-control-lg"
                    placeholder="Confirma la contraseña" [(ngModel)]="confirm">
            </div>

            @if (isLoggedIn()) {
                <div class="mb-3">
                    <label class="form-label">Rol: </label>
                    <select name="rol" class="form-select" [(ngModel)]="usuario.rol" required>
                        <option value="ADMIN"> ADMIN </option>
                        <option value="USER"> USER </option>
                    </select>
                </div>
            }

            <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" id="showPasswordCheck" [(ngModel)]="showPassword"
                    name="showPassword">
                <label class="form-check-label" for="showPasswordCheck">
                    {{showPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'}}
                </label>
            </div>

            <div class="d-grid mb-4">
                <button class="btn btn-success btn-lg shadow-sm" type="button" (click)="registrar()" title='Registrar usuario'>
                    Registrar
                </button>
                <br>
                <button class="btn btn-danger btn-lg shadow-sm" type="button" (click)="login()" title='Cancelar registro'>
                    Cancelar
                </button>
            </div>

            @if(!isLoggedIn()){
                <p class="text-center text-muted mb-0">
                    ¿Ya tienes una cuenta?
                    <a class="text-dark fw-bold" style="cursor: pointer;" (click)="login()" title='Inicia sesion con tu usuario'>
                        Inicia sesión
                    </a>
                </p>
            }
        </form>
    </div>
</div>
