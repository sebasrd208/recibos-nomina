<div class="container d-flex justify-content-center align-items-center mt-3">
    <div class="card shadow p-4" style="width:400px; user-select: none;">
        <h3 class="text-center mb-4"> REGISTRO </h3>

        <form (ngSubmit)="registrar()">
            <div class="mb-3">
                <label class="form-label">Nombre: </label>
                <input type="text" class="form-control" [(ngModel)]="universal.nombre" name="nombre">
            </div>

            <div class="mb-3">
                <label class="form-label">APELLIDO: </label>
                <input type="text" class="form-control" [(ngModel)]="universal.apellido" name="rfc">
            </div>

            <div class="mb-3">
                <label class="form-label">NUMERO DE EMPLEADO:</label>
                <input type="number" class="form-control" [(ngModel)]="universal.numEmpleado" name="email">
            </div>
                    
            <button class="btn btn-dark w-100 mb-3" title='Registrar empleado'>
                <i class="bi bi-check-circle me-2"></i>Registrar empleado
            </button>

            <button class="btn btn-danger w-100 mb-3" (click)="cancelar()" title='Cancelar registro'>
                <i class="bi bi-x-circle me-2"></i> Cancelar
            </button>
        </form>
    </div>
</div>
